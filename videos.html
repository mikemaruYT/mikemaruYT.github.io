<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>みけまる-動画</title>
  <style>
    .bar {
      width: 100%;
      height: 70px;
      background-color: white;
      position: fixed;
      z-index: 10000;
      top: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 40px;
    }

    body {
      margin: 0;
      padding-top: 80px;
      text-align: center;
      font-family: "Dela Gothic One", sans-serif;
    }

    .oned {
      color: orange;
      font-size: 40px;
    }

    .bar a {
      font-size: 30px;
      color: black;
      text-decoration: none;
    }
    .video{
      width:320px;
      display:inline-block;
      margin:10px;
    }
    iframe{
      width:320px;
      height:180px;
    }
  </style>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&display=swap" rel="stylesheet">
</head>
<body>
  <div class="bar">
    <span class="oned">みけまる</span>
    <a href="https://mikemaruyt.github.io">Home</a>
    <a href="https://mikemaruyt.github.io/videos.html">Video</a>
    <a href="https://mikemaruyt.github.io/News.html">News</a>
    <a href="https://mikemaruyt.github.io/Downloads.html">Downloads</a>
  </div>

 
<script>
const channelId = "UCH4Ed73Heuuo-nG2ghwod-g"; // ←ここを入れる
const rss = "https://www.youtube.com/feeds/videos.xml?channel_id=" + channelId;

fetch("https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(rss))
.then(res=>res.json())
.then(data=>{

const videos = document.getElementById("videos");

data.items.forEach(v=>{

const id = v.link.split("v=")[1];

videos.innerHTML += `
<div class="video">
<iframe src="https://www.youtube.com/embed/${id}" frameborder="0" allowfullscreen></iframe>
<p>${v.title}</p>
</div>
`;

});

});
</script>
</body>
</html>
