<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>みけまる-動画</title>

<style>

.bar{
width:100%;
height:70px;
background:white;
position:fixed;
top:0;
z-index:10000;
display:flex;
align-items:center;
justify-content:center;
gap:40px;
}

body{
margin:0;
padding-top:90px;
text-align:center;
font-family:"Dela Gothic One",sans-serif;
}

.oned{
color:orange;
font-size:40px;
}

.bar a{
font-size:30px;
color:black;
text-decoration:none;
}

.video{
width:320px;
display:inline-block;
margin:10px;
}

iframe{
width:320px;
height:180px;
}

</style>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&display=swap" rel="stylesheet">

</head>

<body>

<div class="bar">
<span class="oned">みけまる</span>

<a href="https://mikemaruyt.github.io">Home</a>
<a href="https://mikemaruyt.github.io/videos.html">Video</a>
<a href="https://mikemaruyt.github.io/News.html">News</a>
<a href="https://mikemaruyt.github.io/Downloads.html">Downloads</a>
</div>


<!-- 動画表示場所 -->
<div id="videos"></div>


<script>

const channelID = "UCH4Ed73Heuuo-nG2ghwod-g";

fetch(
"https://api.allorigins.win/raw?url=" +
encodeURIComponent(
"https://www.youtube.com/feeds/videos.xml?channel_id="+channelID
)
)

.then(res=>res.text())
.then(str=>{

const parser = new DOMParser();
const xml = parser.parseFromString(str,"text/xml");

const entries = xml.getElementsByTagName("entry");

for(let i=0;i<entries.length;i++){

let id = entries[i]
.getElementsByTagName("yt:videoId")[0]
.textContent;

let title = entries[i]
.getElementsByTagName("title")[0]
.textContent;

document.getElementById("videos").innerHTML +=
`
<div class="video">
<iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>
<p>${title}</p>
</div>
`;

}

});

</script>

</body>
</html>
